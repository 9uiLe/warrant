<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>warrant — トレーサビリティ可視化</title>
<style>
  :root { --pass: #22c55e; --fail: #ef4444; --bg: #0f172a; --fg: #e2e8f0; --card: #1e293b; --border: #334155; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font-family: system-ui, sans-serif; padding: 1.5rem; }
  h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
  .notice { background: #422006; border: 1px solid #92400e; color: #fcd34d; padding: 0.75rem 1rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .badge { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 9999px; font-weight: bold; font-size: 1rem; margin-bottom: 1rem; }
  .pass { background: var(--pass); color: #052e16; }
  .fail { background: var(--fail); color: #fff; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
  h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; padding: 0.5rem; border-bottom: 1px solid var(--border); color: #94a3b8; }
  td { padding: 0.5rem; border-bottom: 1px solid #1e293b; vertical-align: top; }
  code { background: #0f172a; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.8em; }
  .viol { color: var(--fail); font-weight: 600; }
  #graph-svg { width: 100%; min-height: 300px; }
  .loading { color: #64748b; }
  .err { color: var(--fail); }
</style>
</head>
<body>
<h1>warrant トレーサビリティ可視化</h1>
<div class="notice">⚠ このページは派生データ・読み取り専用です。判断の根拠にしてはなりません。正本は <code>.warrant/requirements.yaml</code> と各仕様・テスト本体です。</div>

<div id="badge-area"><span class="loading">読み込み中...</span></div>

<div class="card">
  <h2>機能カバレッジ</h2>
  <div id="coverage-table"><span class="loading">読み込み中...</span></div>
</div>

<div class="card">
  <h2>違反パネル</h2>
  <div id="violations-panel"><span class="loading">読み込み中...</span></div>
</div>

<div class="card">
  <h2>ノードリンク図</h2>
  <svg id="graph-svg" viewBox="0 0 800 400">
    <text x="10" y="20" fill="#64748b" font-size="12">読み込み中...</text>
  </svg>
</div>

<script>
(async () => {
  let data;
  try {
    const res = await fetch('/api/graph');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch (e) {
    document.getElementById('badge-area').innerHTML = '<span class="err">エラー: ' + e.message + '</span>';
    return;
  }

  // バッジ
  const verdict = data.verdict || 'UNKNOWN';
  const cls = verdict === 'PASS' ? 'pass' : 'fail';
  document.getElementById('badge-area').innerHTML =
    '<span class="badge ' + cls + '">' + verdict + '</span>' +
    ' <span style="color:#94a3b8;font-size:0.85rem">機能 ' + data.requirementCount + ' 件 / 生成: ' + data.generatedAt + '</span>';

  // カバレッジ表
  const reqNodes = (data.nodes || []).filter(n => n.kind === 'requirement');
  const edges = data.edges || [];
  const buildCovTable = () => {
    if (reqNodes.length === 0) return '<span style="color:#64748b">要件なし</span>';
    let html = '<table><thead><tr><th>ID</th><th>タイトル</th><th>仕様</th><th>テスト</th></tr></thead><tbody>';
    for (const n of reqNodes) {
      const specEdges = edges.filter(e => e.from === n.id && e.kind === 'spec');
      const testEdges = edges.filter(e => e.from === n.id && e.kind === 'test');
      const specCell = specEdges.map(e => '<code>' + esc(e.to.replace('spec:', '')) + '</code>').join('<br>') || '—';
      const testCell = testEdges.map(e => '<code>' + esc(e.to.replace('test:', '')) + '</code>').join('<br>') || '—';
      html += '<tr><td><code>' + esc(n.id) + '</code></td><td>' + esc(n.label) + '</td><td>' + specCell + '</td><td>' + testCell + '</td></tr>';
    }
    html += '</tbody></table>';
    return html;
  };
  document.getElementById('coverage-table').innerHTML = buildCovTable();

  // 違反パネル
  const vs = data.violations || [];
  if (vs.length === 0) {
    document.getElementById('violations-panel').innerHTML = '<span style="color:var(--pass)">違反なし</span>';
  } else {
    let html = '<table><thead><tr><th>コード</th><th>要件</th><th>メッセージ</th></tr></thead><tbody>';
    for (const v of vs) {
      html += '<tr><td class="viol"><code>' + esc(v.code) + '</code></td><td>' + esc(v.requirement) + '</td><td>' + esc(v.message) + '</td></tr>';
    }
    html += '</tbody></table>';
    document.getElementById('violations-panel').innerHTML = html;
  }

  // SVG グラフ（簡易列配置）
  drawGraph(data);
})();

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function drawGraph(data) {
  const svg = document.getElementById('graph-svg');
  const nodes = data.nodes || [];
  const edges = data.edges || [];
  if (nodes.length === 0) {
    svg.innerHTML = '<text x="10" y="20" fill="#64748b" font-size="12">ノードなし</text>';
    return;
  }

  const W = 800, H = 400;
  const cols = { requirement: [], spec: [], test: [] };
  for (const n of nodes) cols[n.kind] = (cols[n.kind] || []);
  for (const n of nodes) { if (!cols[n.kind]) cols[n.kind] = []; cols[n.kind].push(n); }

  const colX = { requirement: 150, spec: 400, test: 650 };
  const pos = {};
  ['requirement', 'spec', 'test'].forEach(kind => {
    const list = cols[kind] || [];
    list.forEach((n, i) => {
      const y = (H / (list.length + 1)) * (i + 1);
      pos[n.id] = { x: colX[kind], y };
    });
  });

  const kindColor = { requirement: '#6366f1', spec: '#0ea5e9', test: '#22c55e' };
  let html = '';
  // edges
  for (const e of edges) {
    const a = pos[e.from], b = pos[e.to];
    if (!a || !b) continue;
    html += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#334155" stroke-width="1.5" />`;
  }
  // nodes
  for (const n of nodes) {
    const p = pos[n.id];
    if (!p) continue;
    const c = kindColor[n.kind] || '#888';
    const label = n.label.length > 16 ? n.label.slice(0, 14) + '…' : n.label;
    html += `<circle cx="${p.x}" cy="${p.y}" r="22" fill="${c}" opacity="0.85" />`;
    html += `<text x="${p.x}" y="${p.y - 28}" text-anchor="middle" fill="#e2e8f0" font-size="10">${esc(n.id)}</text>`;
    html += `<text x="${p.x}" y="${p.y + 4}" text-anchor="middle" fill="#fff" font-size="9">${esc(label)}</text>`;
  }
  // 凡例
  html += `<text x="10" y="390" fill="#64748b" font-size="10">● 機能(紫) ● 仕様(青) ● テスト(緑)</text>`;
  svg.innerHTML = html;
}
</script>
</body>
</html>
