name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build all targets
        run: |
          set -eu
          mkdir -p dist
          for GOOS in darwin linux windows; do
            for GOARCH in amd64 arm64; do
              asset="warrant_${GOOS}_${GOARCH}"
              if [ "$GOOS" = "windows" ]; then
                asset="${asset}.exe"
              fi
              CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
                go build -trimpath \
                  -ldflags "-s -w -X github.com/9uiLe/warrant/internal/version.Version=${GITHUB_REF_NAME}" \
                  -o "dist/${asset}" .
              echo "built: dist/${asset}"
            done
          done

      - name: Generate checksums.txt
        run: |
          cd dist
          sha256sum warrant_* > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/warrant_*
            dist/checksums.txt
