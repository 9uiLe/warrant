name: Governance Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  warrant:
    name: warrant check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.23"

      - name: go mod tidy
        run: go mod tidy

      - name: Run tests
        run: go test ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o warrant .

      - name: Governance gate (warrant check)
        run: ./warrant check
