# 要件登録簿 (SSOT) — warrant 自身の統治対象
# このファイルが判断の唯一の正本です。
# 派生データ（*.generated.*）を spec.doc に指定すると E-SPEC-DERIVED で失敗します。

requirements:
  - id: WARRANT-CHECK
    title: "トレーサビリティ司法ゲート（check コマンド）"
    status: active
    priority: critical
    category: 司法ゲート
    spec:
      doc: "docs/spec/check.md"
      section: "## 違反コード一覧"
    tests:
      - "internal/check/check_test.go"

  - id: WARRANT-GLOB
    title: "fnmatch 互換のパスマッチング（glob）"
    status: active
    priority: high
    category: 基盤
    spec:
      doc: "docs/spec/glob.md"
      section: "## マッチング規則"
    tests:
      - "internal/glob/glob_test.go"

  - id: WARRANT-INIT
    title: "雛形生成（init コマンド）"
    status: active
    priority: medium
    category: CLI
    spec:
      doc: "docs/spec/init.md"
      section: "## 不変条件"
    tests:
      - "internal/cli/init_test.go"

  - id: WARRANT-REPORT
    title: "派生レポート生成（report コマンド）"
    status: active
    priority: medium
    category: 出力
    spec:
      doc: "docs/spec/report.md"
      section: "## 不変条件"
    tests:
      - "internal/report/report_test.go"

  - id: WARRANT-SERVE
    title: "可視化サーバ（serve コマンド）"
    status: active
    priority: high
    category: 可視化
    spec:
      doc: "docs/spec/serve.md"
      section: "## 不変条件（安全性）"
    tests:
      - "internal/serve/serve_test.go"
